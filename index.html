<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANITA OLSHOP - Official Member</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #fff1f7 50%, #fce4ec 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; padding-top: 30px; }
        .header h1 { color: #e91e63; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(233,30,99,0.2); }
        .btn {
            background: linear-gradient(45deg, #e91e63, #f06292); color: white;
            border: none; padding: 14px 25px; border-radius: 25px;
            cursor: pointer; font-size: 16px; font-weight: bold;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(233,30,99,0.2);
            width: 100%; margin: 10px 0;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,99,0.3); opacity: 0.9; }
        .btn-secondary { background: #f8bbd9; color: #e91e63; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #e91e63; }
        .form-group input { 
            width: 100%; padding: 15px; border: 2px solid #f8bbd9; 
            border-radius: 20px; font-size: 16px; outline: none;
        }
        .auth-container { 
            max-width: 400px; margin: 20px auto; background: white; 
            padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(233,30,99,0.1);
        }
        .tabs { display: flex; margin-bottom: 25px; background: #fce4ec; border-radius: 25px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-weight: bold; cursor: pointer; color: #e91e63; }
        .tab-btn.active { background: #e91e63; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .coin-display { font-size: 3em; color: #e91e63; font-weight: bold; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #fce4ec; text-align: left; }
        th { background: #fce4ec; color: #e91e63; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="container">
        <div class="header">
            <h1>🛍️ KANITA OLSHOP</h1>
            <p>Sistem Member & Koin Loyalitas</p>
            <button class="btn" style="width:auto; padding:15px 50px; margin-top:30px;" onclick="showPage('authModal')">MULAI SEKARANG</button>
        </div>
    </div>
</div>

<div id="authModal" class="hidden">
    <div class="container">
        <div class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" id="btnTabBuyer">🛒 PEMBELI</button>
                <button class="tab-btn" id="btnTabOwner">👑 PEMILIK</button>
            </div>
            
            <div id="panelBuyer" class="tab-content active">
                <form id="formBuyer">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" id="inBuyerName" placeholder="Contoh: Siti Aminah" required>
                    </div>
                    <div class="form-group">
                        <label>No. WhatsApp</label>
                        <input type="tel" id="inBuyerPhone" placeholder="08123456789" required>
                    </div>
                    <button type="submit" class="btn">🚀 MASUK SEBAGAI MEMBER</button>
                    <button type="button" class="btn btn-secondary" onclick="showPage('mainPage')">KEMBALI</button>
                </form>
            </div>

            <div id="panelOwner" class="tab-content">
                <form id="formOwner" autocomplete="off">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="inOwnerUser" placeholder="Username Pemilik" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="inOwnerPass" placeholder="Password Rahasia" required>
                    </div>
                    <button type="submit" class="btn" style="background:#333;">🔓 LOGIN ADMIN</button>
                    <button type="button" class="btn btn-secondary" onclick="showPage('mainPage')">KEMBALI</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="ownerDashboard" class="hidden">
    <div class="container">
        <div class="header">
            <h1>👑 ADMIN KANITA</h1>
            <button class="btn btn-secondary" style="width:auto;" onclick="appLogout()">🚪 LOGOUT</button>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h3>💎 ISI KOIN MEMBER</h3>
                <input type="tel" id="searchHP" placeholder="Cari No HP Member" class="form-group input" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:10px;">
                <button class="btn" onclick="actionSearch()">🔎 CARI</button>
                
                <div id="boxTopup" class="hidden" style="margin-top:20px; padding-top:20px; border-top:2px dashed #f8bbd9;">
                    <p id="txtTargetName" style="font-weight:bold; color:#e91e63;"></p>
                    <input type="number" id="numBelanja" placeholder="Nominal Belanja (Rp)" style="width:100%; padding:10px; margin:10px 0;">
                    <button class="btn" onclick="actionAddCoin()">✨ TAMBAH KOIN</button>
                </div>
            </div>
            <div class="card" style="text-align:center;">
                <h3>📱 QR CODE TOKO</h3>
                <canvas id="canvasQR" style="margin: 15px auto; display: block;"></canvas>
                <button class="btn btn-secondary" onclick="downloadQR()">📥 UNDUH QR CODE</button>
            </div>
        </div>
        <div class="card" style="margin-top:25px; overflow-x:auto;">
            <h3>📊 DATA SEMUA MEMBER (<span id="countMember">0</span>)</h3>
            <table id="tblMember">
                <thead><tr><th>No</th><th>Nama</th><th>No. HP</th><th>Koin</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="buyerDashboard" class="hidden">
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 40px auto; text-align: center;">
            <h2 id="txtBuyerHello">Halo!</h2>
            <div class="coin-display"><span id="txtBuyerCoin">0</span> 💎</div>
            <p style="color:#666; margin-bottom:20px;">Tunjukkan nomor HP Anda ke kasir saat belanja untuk kumpulkan koin!</p>
            <button class="btn btn-secondary" onclick="appLogout()">🚪 KELUAR</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBe-4ZFPB9Y-PVgHpBDtmZ-QpWZgHy5x0M",
        authDomain: "kanitshop-89e2d.firebaseapp.com",
        projectId: "kanitshop-89e2d",
        databaseURL: "https://kanitshop-89e2d-default-rtdb.firebaseio.com",
        storageBucket: "kanitshop-89e2d.firebasestorage.app",
        messagingSenderId: "982746261387",
        appId: "1:982746261387:web:d16dfa2ed014dac12a718e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Variabel Global
    window.listMember = [];
    window.currentUser = null;

    // Fungsi Navigasi
    window.showPage = (id) => {
        document.querySelectorAll('#mainPage, #authModal, #ownerDashboard, #buyerDashboard').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    // Tab Switcher
    document.getElementById('btnTabBuyer').onclick = () => {
        document.getElementById('panelBuyer').classList.add('active');
        document.getElementById('panelOwner').classList.remove('active');
        document.getElementById('btnTabBuyer').classList.add('active');
        document.getElementById('btnTabOwner').classList.remove('active');
    };
    document.getElementById('btnTabOwner').onclick = () => {
        document.getElementById('panelOwner').classList.add('active');
        document.getElementById('panelBuyer').classList.remove('active');
        document.getElementById('btnTabOwner').classList.add('active');
        document.getElementById('btnTabBuyer').classList.remove('active');
    };

    // LOGIKA PEMBELI (LOGIN/DAFTAR)
    document.getElementById('formBuyer').onsubmit = async (e) => {
        e.preventDefault();
        const nama = document.getElementById('inBuyerName').value.trim();
        const hp = document.getElementById('inBuyerPhone').value.trim();

        if(!hp.startsWith('08')) return alert('Gunakan format nomor HP 08...');

        const userRef = ref(db, 'members/' + hp);
        try {
            const snap = await get(userRef);
            if(snap.exists()){
                const data = snap.val();
                window.currentUser = data;
            } else {
                const dataBaru = { name: nama, phone: hp, coins: 0, join: new Date().toISOString() };
                await set(userRef, dataBaru);
                window.currentUser = dataBaru;
            }
            // NAVIGASI KE DASHBOARD PEMBELI
            document.getElementById('txtBuyerHello').innerText = "Halo, " + window.currentUser.name + "!";
            document.getElementById('txtBuyerCoin').innerText = window.currentUser.coins;
            showPage('buyerDashboard');
        } catch (err) { alert('Gagal terhubung ke database.'); }
    };

    // LOGIKA PEMILIK (LOGIN)
    document.getElementById('formOwner').onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById('inOwnerUser').value;
        const p = document.getElementById('inOwnerPass').value;

        if(u === 'KANITAOLSHOP' && p === 'KANITATHENDY29062009') {
            showPage('ownerDashboard');
            generateMyQR();
            listenDatabase();
            document.getElementById('formOwner').reset();
        } else {
            alert('Username atau Password Salah!');
        }
    };

    // DATABASE LISTENER (ADMIN)
    function listenDatabase() {
        onValue(ref(db, 'members'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.querySelector('#tblMember tbody');
            tbody.innerHTML = "";
            window.listMember = data ? Object.values(data) : [];
            
            window.listMember.sort((a,b) => (b.coins || 0) - (a.coins || 0)).forEach((m, i) => {
                tbody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${m.name}</td>
                    <td>${m.phone}</td>
                    <td style="font-weight:bold; color:#e91e63;">${m.coins || 0}</td>
                </tr>`;
            });
            document.getElementById('countMember').innerText = window.listMember.length;
        });
    }

    // SEARCH & TOPUP (ADMIN)
    window.actionSearch = () => {
        const hp = document.getElementById('searchHP').value.trim();
        const target = window.listMember.find(m => m.phone === hp);
        if(target) {
            window.activeTarget = target;
            document.getElementById('txtTargetName').innerText = "Member: " + target.name;
            document.getElementById('boxTopup').classList.remove('hidden');
        } else {
            alert('Member tidak ditemukan!');
        }
    };

    window.actionAddCoin = async () => {
        const rp = parseInt(document.getElementById('numBelanja').value);
        if(!rp || rp < 1000) return alert('Masukkan nominal belanja valid!');
        
        const koinBaru = Math.floor(rp / 1000);
        const totalKoin = (window.activeTarget.coins || 0) + koinBaru;

        try {
            await update(ref(db, 'members/' + window.activeTarget.phone), { coins: totalKoin });
            alert('Berhasil! Menambahkan ' + koinBaru + ' koin.');
            document.getElementById('boxTopup').classList.add('hidden');
            document.getElementById('numBelanja').value = "";
            document.getElementById('searchHP').value = "";
        } catch (e) { alert('Gagal update data.'); }
    };

    // QR CODE LOGIC
    function generateMyQR() {
        const canvas = document.getElementById('canvasQR');
        // Pastikan library QRCode sudah siap
        if(typeof QRCode !== 'undefined') {
            QRCode.toCanvas(canvas, window.location.href, { 
                width: 200,
                margin: 2,
                color: { dark: "#e91e63", light: "#ffffff" }
            }, function (error) {
                if (error) console.error(error);
            });
        }
    }

    window.downloadQR = () => {
        const canvas = document.getElementById('canvasQR');
        const link = document.createElement('a');
        link.download = 'QR_KanitaOlshop.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    window.appLogout = () => {
        window.currentUser = null;
        showPage('mainPage');
    };

</script>
</body>
</html>
