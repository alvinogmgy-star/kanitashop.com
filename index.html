<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANITA OLSHOP - Member Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #fff1f7 50%, #fce4ec 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #e91e63; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(233,30,99,0.3); margin-bottom: 10px; }
        .btn {
            background: linear-gradient(45deg, #e91e63, #f06292); color: white;
            border: none; padding: 12px 20px; border-radius: 25px;
            cursor: pointer; font-size: 15px; font-weight: bold;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(233,30,99,0.2);
            width: 100%; margin: 8px 0;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,99,0.3); }
        .btn-secondary { background: linear-gradient(45deg, #f8bbd9, #ffc1e3); color: #e91e63; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #e91e63; }
        .form-group input { 
            width: 100%; padding: 14px; border: 2px solid #f8bbd9; 
            border-radius: 20px; font-size: 16px; transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #e91e63; background: #fff; }
        .auth-container { 
            max-width: 400px; margin: 40px auto; background: white; 
            padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(233,30,99,0.1);
        }
        .tabs { display: flex; margin-bottom: 25px; background: #f8bbd9; border-radius: 25px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-weight: bold; cursor: pointer; color: #e91e63; }
        .tab-btn.active { background: #e91e63; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(233,30,99,0.05); }
        #qrcodeCanvas { border: 2px solid #f8bbd9; border-radius: 10px; max-width: 100%; }
        .members-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .members-table th, .members-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f8bbd9; }
        .members-table th { background: #e91e63; color: white; }
        .coin-display { font-size: 2.5em; color: #e91e63; font-weight: bold; text-align: center; margin: 20px 0; }
        .success-message { background: #d1e7dd; color: #0f5132; padding: 12px; border-radius: 10px; margin: 15px 0; text-align: center; font-weight: bold; }
        .hidden { display: none !important; }
        
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="container">
        <div class="header" style="margin-top: 50px;">
            <h1>🛍️ KANITA OLSHOP</h1>
            <p>Member Digital & Loyalty System</p>
            <button class="btn btn-secondary" onclick="window.showAuth()" style="width: auto; padding: 15px 40px; margin-top: 20px;">📱 Login / Daftar Member</button>
        </div>
    </div>
</div>

<div id="authModal" class="hidden">
    <div class="container">
        <div class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" id="buyerTabBtn">🛒 Pembeli</button>
                <button class="tab-btn" id="ownerTabBtn">👑 Pemilik</button>
            </div>
            
            <div id="buyerTab" class="tab-content active">
                <form id="buyerForm">
                    <div class="form-group">
                        <label>👤 Nama Lengkap</label>
                        <input type="text" id="buyerName" placeholder="Nama Anda" required>
                    </div>
                    <div class="form-group">
                        <label>📱 No. WhatsApp</label>
                        <input type="tel" id="buyerPhone" placeholder="08xxxxxxxxxx" inputmode="numeric" required>
                    </div>
                    <button type="submit" class="btn">🚀 MASUK / DAFTAR</button>
                    <button type="button" class="btn btn-secondary" onclick="window.showMainPage()">Batal</button>
                </form>
            </div>

            <div id="ownerTab" class="tab-content">
                <form id="ownerForm" autocomplete="off">
                    <div class="form-group">
                        <label>👑 Username Pemilik</label>
                        <input type="text" id="ownerUsername" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <label>🔐 Password</label>
                        <input type="password" id="ownerPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn" style="background: #333;">🔓 LOGIN OWNER</button>
                    <button type="button" class="btn btn-secondary" onclick="window.showMainPage()">Batal</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="ownerDashboard" class="hidden">
    <div class="container">
        <div class="header">
            <h2>👑 ADMIN KANITA</h2>
            <button class="btn btn-secondary" onclick="window.logout()" style="width: auto; float: right;">🚪 Logout</button>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h3>🔍 Cari Member</h3>
                <input type="tel" id="searchPhone" placeholder="Masukkan No HP" class="btn" style="background: white; color: #333; border: 1px solid #ddd;" inputmode="numeric">
                <button class="btn" onclick="window.searchMember()">🔎 Cek Data</button>
                <div id="conversionForm" class="hidden">
                    <div class="success-message" id="memberFound"></div>
                    <input type="number" id="amountRp" placeholder="Total Belanja Rp" class="btn" style="background: white; color: #333; border: 1px solid #ddd;">
                    <button class="btn" onclick="window.addCoinsAction()">💎 Tambah Koin</button>
                </div>
            </div>
            <div class="card" style="text-align: center;">
                <h3>📱 QR Toko</h3>
                <canvas id="qrcodeCanvas" style="margin-top: 10px;"></canvas>
            </div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h3>📊 Daftar Member (<span id="totalMembers">0</span>)</h3>
            <div style="overflow-x: auto;">
                <table class="members-table" id="membersTable">
                    <thead><tr><th>No</th><th>Nama</th><th>No. HP</th><th>Koin</th><th>Aksi</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="buyerDashboard" class="hidden">
    <div class="container">
        <div class="card" style="max-width: 450px; margin: 50px auto; text-align: center;">
            <h2 id="buyerNameDisplay">Halo!</h2>
            <div class="coin-display" id="buyerCoins">0 💎</div>
            <p>Berikan nomor HP Anda saat belanja untuk koin!</p>
            <button class="btn btn-secondary" onclick="window.logout()">🚪 Keluar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBe-4ZFPB9Y-PVgHpBDtmZ-QpWZgHy5x0M",
        authDomain: "kanitshop-89e2d.firebaseapp.com",
        projectId: "kanitshop-89e2d",
        databaseURL: "https://kanitshop-89e2d-default-rtdb.firebaseio.com",
        storageBucket: "kanitshop-89e2d.firebasestorage.app",
        messagingSenderId: "982746261387",
        appId: "1:982746261387:web:d16dfa2ed014dac12a718e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let membersArr = [];
    let targetMember = null;
    const WA_REGEX = /^08[1-9][0-9]{7,10}$/;

    // NAVIGASI
    window.showPage = (id) => {
        document.querySelectorAll('#mainPage, #authModal, #ownerDashboard, #buyerDashboard').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };
    window.showAuth = () => window.showPage('authModal');
    window.showMainPage = () => window.showPage('mainPage');
    window.logout = () => {
        document.getElementById('ownerForm').reset();
        document.getElementById('buyerForm').reset();
        window.showMainPage();
    };

    // TABS
    document.getElementById('buyerTabBtn').onclick = () => {
        document.getElementById('buyerTab').classList.add('active');
        document.getElementById('ownerTab').classList.remove('active');
        document.getElementById('buyerTabBtn').classList.add('active');
        document.getElementById('ownerTabBtn').classList.remove('active');
    };
    document.getElementById('ownerTabBtn').onclick = () => {
        document.getElementById('ownerTab').classList.add('active');
        document.getElementById('buyerTab').classList.remove('active');
        document.getElementById('ownerTabBtn').classList.add('active');
        document.getElementById('buyerTabBtn').classList.remove('active');
    };

    // PEMBELI
    document.getElementById('buyerForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('buyerName').value.trim();
        const phone = document.getElementById('buyerPhone').value.trim();

        if (!WA_REGEX.test(phone)) return alert('Gunakan nomor WA 08... yang valid!');

        const userRef = ref(db, 'members/' + phone);
        try {
            const snap = await get(userRef);
            if (snap.exists()) {
                const data = snap.val();
                await update(userRef, { loginCount: (data.loginCount || 0) + 1 });
                displayBuyer(data);
            } else {
                const newM = { name, phone, coins: 0, loginCount: 1, joinDate: new Date().toISOString() };
                await set(userRef, newM);
                displayBuyer(newM);
            }
        } catch (err) { alert("Error Database!"); }
    };

    function displayBuyer(m) {
        document.getElementById('buyerNameDisplay').innerText = "Halo, " + m.name;
        document.getElementById('buyerCoins').innerText = (m.coins || 0) + " 💎";
        window.showPage('buyerDashboard');
    }

    // OWNER
    document.getElementById('ownerForm').onsubmit = (e) => {
        e.preventDefault();
        const user = document.getElementById('ownerUsername').value.trim();
        const pass = document.getElementById('ownerPassword').value;

        if(user === 'KANITAOLSHOP' && pass === 'KANITATHENDY29062009') {
            window.showPage('ownerDashboard');
            const canvas = document.getElementById('qrcodeCanvas');
            if (canvas.width <= 100) QRCode.toCanvas(canvas, window.location.href, { width: 140 });
            listenToMembers();
            document.getElementById('ownerForm').reset();
        } else { alert('Akses Ditolak!'); }
    };

    function listenToMembers() {
        onValue(ref(db, 'members'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.querySelector('#membersTable tbody');
            tbody.innerHTML = "";
            membersArr = data ? Object.values(data).sort((a,b) => (b.coins || 0) - (a.coins || 0)) : [];
            
            membersArr.forEach((m, i) => {
                tbody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${m.name}</td>
                    <td>${m.phone}</td>
                    <td style="color:#e91e63; font-weight:bold">${m.coins || 0}</td>
                    <td><button onclick="window.chatWA('${m.phone}')" style="padding:4px 8px; border-radius:10px; border:1px solid #ddd; cursor:pointer">💬 Chat</button></td>
                </tr>`;
            });
            document.getElementById('totalMembers').innerText = membersArr.length;
        });
    }

    window.searchMember = () => {
        const phone = document.getElementById('searchPhone').value.trim();
        targetMember = membersArr.find(m => m.phone === phone);
        if(targetMember) {
            document.getElementById('memberFound').innerText = "Member: " + targetMember.name;
            document.getElementById('conversionForm').classList.remove('hidden');
        } else { alert('Tidak Ditemukan!'); }
    };

    window.addCoinsAction = async () => {
        const rp = parseInt(document.getElementById('amountRp').value);
        if(!rp || rp < 1000) return alert('Min Rp 1.000');
        const bonus = Math.floor(rp / 1000);
        await update(ref(db, 'members/' + targetMember.phone), { coins: (targetMember.coins || 0) + bonus });
        alert('Berhasil Tambah ' + bonus + ' Koin!');
        document.getElementById('conversionForm').classList.add('hidden');
    };

    window.chatWA = (p) => window.open(`https://wa.me/62${p.substring(1)}`, '_blank');
</script>
</body>
</html>
