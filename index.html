<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanita Olshop - Loyalty Card</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff4d94; --gold: #ffd700; --bg: #fff5f8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 40px rgba(255, 77, 148, 0.15); align-self: flex-start; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--pink); margin: 0; font-size: 24px; letter-spacing: 2px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #f8f8f8; border-radius: 12px; outline: none; font-family: inherit; }
        input:focus { border-color: var(--pink); }
        button { width: 100%; padding: 15px; background: var(--pink); color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .btn-secondary { background: #f0f0f0; color: #666; margin-top: 10px; }
        .thanks-box { text-align: center; padding: 40px 15px; background: linear-gradient(135deg, var(--pink), #ff85b3); color: white; border-radius: 25px; margin-bottom: 20px; }
        .coin-circle { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border: 4px solid var(--gold); border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 600; }
        .table-container { max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; padding: 10px; color: #888; text-align: left; position: sticky; top: 0; border-bottom: 1px solid #eee; }
        td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }
        #loader { display: none; text-align: center; color: var(--pink); font-weight: 600; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌸 KANITA OLSHOP</h1>
        <p style="font-size: 10px; color: #ccc; margin: 0;">MEMBERSHIP DIGITAL</p>
    </div>

    <div id="loader">Sedang Memproses... ✨</div>

    <div id="pg-auth" class="section active">
        <div class="card">
            <label style="font-size: 11px; font-weight: 600; color: #888;">NAMA LENGKAP</label>
            <input type="text" id="reg-nama" placeholder="Contoh: Siti">
            <label style="font-size: 11px; font-weight: 600; color: #888;">NOMOR WHATSAPP</label>
            <input type="number" id="reg-phone" placeholder="Contoh: 62812345678">
            <button id="btn-login" onclick="handleAuth()">Masuk & Cek Koin ✨</button>
        </div>
        <button class="btn-secondary" onclick="aksesAdmin()">Panel Penjual 🔑</button>
    </div>

    <div id="pg-buyer" class="section">
        <div class="thanks-box">
            <h2 style="margin: 0; font-size: 16px; font-weight: 300;">TERIMAKASIH TELAH BERBELANJA DI KANITA OLSHOP</h2>
            <div class="coin-circle" id="view-koin">0</div>
            <p id="view-nama" style="margin: 0; font-weight: 600; font-size: 18px;"></p>
            <p style="margin: 5px 0 0 0; font-size: 11px; opacity: 0.9;">TOTAL SALDO KOIN ANDA</p>
        </div>
        <button class="btn-secondary" onclick="location.reload()">Keluar Sesi</button>
    </div>

    <div id="pg-admin" class="section">
        <h3 style="margin: 0; color: var(--pink);">📊 Beranda Penjual</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>MEMBER</th>
                        <th style="text-align: center;">KOIN</th>
                        <th style="text-align: right;">PERAK</th>
                    </tr>
                </thead>
                <tbody id="list-statistik">
                    <tr><td colspan="3" style="text-align: center; padding: 20px;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <div style="text-align: center; margin-top: 15px;">
            <div id="qrcode"></div><br>
            <button style="width: auto; padding: 8px 15px; font-size: 11px;" onclick="unduhQR()">Simpan QR Website</button>
        </div>
        <button class="btn-secondary" onclick="location.reload()" style="margin-top: 20px;">Log Out Admin</button>
    </div>

    <div id="pg-konversi" class="section">
        <h3 style="margin: 0 0 15px 0; color: var(--pink);">💰 Update Koin</h3>
        <div class="card">
            <p>Member: <b id="target-nama" style="color: var(--pink);">...</b></p>
            <label style="font-size: 11px;">NOMINAL BELANJA (RP)</label>
            <input type="number" id="nominal-rp" placeholder="Contoh: 100000">
            <div style="background: #fff9fb; padding: 10px; border-radius: 10px; font-size: 12px; color: #d63384; margin-bottom: 15px; text-align: center;">
                Menjadi: <b id="pre-val">0</b> Koin & <b id="pre-per">0</b> Perak
            </div>
            <button onclick="simpanKoin()">Konfirmasi & Simpan</button>
            <button class="btn-secondary" onclick="showPage('pg-admin')">Batal</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI DATABASE BARU ANDA ---
    const firebaseConfig = {
        apiKey: "AIzaSyCkNwuF6gvx6gFr0LboivTJZ5LONeKlLPc",
        authDomain: "kanitaolshop-f8ad0.firebaseapp.com",
        projectId: "kanitaolshop-f8ad0",
        // Menambahkan format URL database yang benar berdasarkan Project ID baru
        databaseURL: "https://kanitaolshop-f8ad0-default-rtdb.firebaseio.com", 
        storageBucket: "kanitaolshop-f8ad0.firebasestorage.app",
        messagingSenderId: "1022490433447",
        appId: "1:1022490433447:web:0b56139301c37bdf2b0882",
        measurementId: "G-HK3EFXLNN5"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentTargetPhone = "";

    // Live Preview Konversi
    document.getElementById('nominal-rp').addEventListener('input', (e) => {
        let val = Math.floor(e.target.value / 1000);
        document.getElementById('pre-val').innerText = val;
        document.getElementById('pre-per').innerText = val;
    });

    // Login/Daftar
    async function handleAuth() {
        const nama = document.getElementById('reg-nama').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        
        if(!nama || phone.length < 10) return alert("Data Nama/WhatsApp tidak benar!");
        
        toggleLoading(true);
        const userRef = db.ref('users/' + phone);
        
        // Cek data sekali (once) untuk menentukan login atau register
        userRef.once('value').then(snap => {
            const data = snap.val();
            if(data) {
                // User sudah ada
                document.getElementById('view-nama').innerText = data.nama;
                document.getElementById('view-koin').innerText = data.coins || 0;
                toggleLoading(false);
                showPage('pg-buyer');
            } else {
                // User baru, buat data baru
                userRef.set({ 
                    nama: nama, 
                    phone: phone, 
                    coins: 0, 
                    joinDate: new Date().toISOString() 
                }).then(() => {
                    document.getElementById('view-nama').innerText = nama;
                    document.getElementById('view-koin').innerText = 0;
                    toggleLoading(false);
                    showPage('pg-buyer');
                });
            }
        }).catch(err => {
            toggleLoading(false);
            alert("Terjadi kesalahan: " + err.message + "\nPastikan Realtime Database Rules sudah diset ke 'true'.");
        });
    }

    // Fungsi Admin & Navigasi
    function aksesAdmin() {
        const pw = prompt("Password Penjual:");
        if(pw === "KANITATHENDY29062009") {
            showPage('pg-admin');
            renderStatistik();
            generateQR();
        } else if(pw !== null) alert("Password Salah!");
    }

    function renderStatistik() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('list-statistik');
            list.innerHTML = "";
            let dataArr = [];
            snap.forEach(c => dataArr.push(c.val()));
            dataArr.sort((a,b) => (b.coins || 0) - (a.coins || 0));
            
            if(dataArr.length === 0) {
                list.innerHTML = "<tr><td colspan='3' style='text-align: center; padding: 20px;'>Belum ada member</td></tr>";
                return;
            }

            dataArr.forEach(m => {
                list.innerHTML += `
                    <tr onclick="bukaKonversi('${m.phone}', '${m.nama}')">
                        <td><b>${m.nama}</b><br><small>${m.phone}</small></td>
                        <td style="text-align:center; color:var(--pink); font-weight:600;">${m.coins || 0}</td>
                        <td style="text-align:right;">${m.coins || 0} PRK</td>
                    </tr>
                `;
            });
        });
    }

    function bukaKonversi(phone, nama) {
        currentTargetPhone = phone;
        document.getElementById('target-nama').innerText = nama;
        document.getElementById('nominal-rp').value = "";
        showPage('pg-konversi');
    }

    function simpanKoin() {
        const rp = document.getElementById('nominal-rp').value;
        if(!rp || rp < 1000) return alert("Minimal belanja Rp 1.000");
        
        const bonus = Math.floor(rp / 1000);
        db.ref('users/' + currentTargetPhone + '/coins').transaction(c => (c || 0) + bonus)
        .then(() => {
            alert("Berhasil menambahkan " + bonus + " koin!");
            showPage('pg-admin');
        });
    }

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleLoading(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    function generateQR() {
        const q = document.getElementById("qrcode"); q.innerHTML = "";
        new QRCode(q, { text: window.location.href, width: 120, height: 120, colorDark: "#ff4d94" });
    }

    function unduhQR() {
        const c = document.querySelector("#qrcode canvas");
        if(c) { const l = document.createElement('a'); l.download = 'QR_Kanita.png'; l.href = c.toDataURL(); l.click(); }
    }
</script>

</body>
</html>
