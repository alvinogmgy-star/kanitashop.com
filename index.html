<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanita Olshop - Loyalty Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background-color: #fff0f5; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .pink-gradient { background: linear-gradient(135deg, #ffb6c1, #ff69b4); }
        .hidden { display: none; }
        /* Custom scrollbar untuk list admin */
        #admin-list-container::-webkit-scrollbar { width: 4px; }
        #admin-list-container::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-pink-100 relative">
        
        <div class="pink-gradient p-8 text-white text-center">
            <h1 class="text-3xl font-black tracking-tighter uppercase">🌸 KANITA OLSHOP</h1>
            <p class="text-xs font-light tracking-[0.2em] opacity-80 mt-1">MEMBERSHIP DIGITAL</p>
        </div>

        <div id="loader" class="hidden absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-pink-500"></div>
            <p class="text-pink-500 mt-4 font-bold animate-pulse text-sm">Sedang Memproses... ✨</p>
        </div>

        <div id="section-login" class="p-8 space-y-5">
            <div class="text-center pb-2">
                <p class="text-gray-500 text-sm italic">Cek saldo koin belanja kamu di sini!</p>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-pink-400 ml-1 uppercase tracking-widest">Nama Lengkap</label>
                <input type="text" id="input-nama" placeholder="Masukkan Nama Anda" class="w-full p-4 bg-pink-50 border-2 border-transparent focus:border-pink-300 rounded-2xl outline-none transition-all text-sm">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-pink-400 ml-1 uppercase tracking-widest">Nomor WhatsApp</label>
                <input type="tel" id="input-wa" placeholder="Contoh: 0812345678" class="w-full p-4 bg-pink-50 border-2 border-transparent focus:border-pink-300 rounded-2xl outline-none transition-all text-sm">
            </div>
            
            <button onclick="handleLogin()" class="w-full pink-gradient text-white font-extrabold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all mt-2">
                Masuk & Cek Koin ✨
            </button>
            
            <button onclick="handleAdminAccess()" class="w-full text-pink-300 text-xs font-semibold py-2 hover:text-pink-500 transition-colors">
                Panel Penjual 🔑
            </button>
        </div>

        <div id="section-member" class="p-8 hidden text-center space-y-6 animate-fade-in">
            <h2 class="text-gray-600 font-bold uppercase tracking-wide text-sm">Halo, <span id="user-greeting" class="text-pink-500">Member</span>!</h2>
            
            <div class="bg-pink-50 p-8 rounded-[2rem] border-4 border-dashed border-pink-200 relative">
                <div id="display-koin" class="text-7xl font-black text-pink-500 leading-none">0</div>
                <p class="text-pink-400 font-extrabold mt-2 uppercase text-[10px] tracking-[0.2em]">Total Saldo Koin</p>
                <div class="mt-4 pt-4 border-t border-pink-200">
                    <p class="text-xs text-gray-400 italic font-medium">Saldo Perak: <span id="display-perak" class="font-bold text-gray-600">0</span></p>
                </div>
            </div>

            <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
                <p class="text-[10px] text-yellow-700 leading-relaxed">
                    Kumpulkan terus koinnya! <br> 
                    <span class="font-bold">10 Koin</span> dapat ditukar dengan potongan belanja senilai <span class="font-bold text-pink-500">Rp10.000</span>.
                </p>
            </div>

            <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-400 font-bold py-3 rounded-2xl hover:bg-gray-200 transition-all text-sm">
                Keluar Sesi
            </button>
        </div>

        <div id="section-admin" class="p-6 hidden bg-gray-50 min-h-[480px]">
            <div class="flex justify-between items-center border-b-2 border-pink-100 pb-4 mb-4">
                <h3 class="font-black text-gray-700 uppercase italic text-sm">📊 Data Member</h3>
                <button onclick="location.reload()" class="text-[9px] bg-red-100 text-red-500 px-3 py-1 rounded-full font-bold uppercase tracking-tighter">Log Out</button>
            </div>
            
            <div id="admin-list-container" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                <p class="text-center text-gray-400 text-xs py-10 italic">Memuat data...</p>
            </div>
        </div>

    </div>

    <script>
        /**
         * KONFIGURASI APLIKASI
         */
        const CONFIG = {
            // Tempelkan URL Web App dari Google Script di sini
            SCRIPT_URL: "GANTI_DENGAN_URL_WEB_APP_GSCRIPT_ANDA", 
            ADMIN_PIN: "1234" 
        };

        function toggleLoading(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        /**
         * FUNGSI LOGIN & PENDAFTARAN OTOMATIS
         */
        async function handleLogin() {
            const nama = document.getElementById('input-nama').value.trim();
            const wa = document.getElementById('input-wa').value.trim();

            if(!nama || !wa) return alert("Mohon isi nama dan nomor WhatsApp kamu ya! 😊");

            toggleLoading(true);
            try {
                // Ambil semua data member dari Sheets
                const response = await fetch(CONFIG.SCRIPT_URL);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                // Cari apakah nomor WA sudah terdaftar
                const user = data.find(u => String(u.wa) === String(wa));

                if(user) {
                    showDashboard(user.nama, user.koin, user.perak);
                } else {
                    // Jika member baru, kirim data pendaftaran ke Sheets
                    const newUser = { nama: nama, wa: wa, koin: 0, perak: 0 };
                    
                    await fetch(CONFIG.SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newUser)
                    });
                    
                    // Langsung masuk ke dashboard (karena POST no-cors tidak return data)
                    showDashboard(nama, 0, 0);
                }
            } catch (err) {
                alert("Gagal terhubung ke database. Pastikan URL SCRIPT sudah benar!");
            } finally {
                toggleLoading(false);
            }
        }

        function showDashboard(nama, koin, perak) {
            document.getElementById('user-greeting').innerText = nama;
            document.getElementById('display-koin').innerText = koin;
            document.getElementById('display-perak').innerText = perak;
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-member').classList.remove('hidden');
        }

        /**
         * FUNGSI KHUSUS ADMIN
         */
        function handleAdminAccess() {
            const inputPin = prompt("Masukkan PIN Keamanan Admin:");
            if(inputPin === CONFIG.ADMIN_PIN) {
                document.getElementById('section-login').classList.add('hidden');
                document.getElementById('section-admin').classList.remove('hidden');
                loadMemberData();
            } else if(inputPin !== null) {
                alert("PIN Salah! Akses ditolak.");
            }
        }

        async function loadMemberData() {
            const container = document.getElementById('admin-list-container');
            container.innerHTML = `<p class="text-center py-10 text-pink-400 animate-bounce text-xs">Menyinkronkan data...</p>`;
            
            try {
                const response = await fetch(CONFIG.SCRIPT_URL);
                const data = await response.json();
                
                if(!data || data.length === 0) {
                    container.innerHTML = `<p class="text-center text-gray-400 py-20 text-xs">Belum ada member terdaftar.</p>`;
                    return;
                }

                container.innerHTML = data.map(m => `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-pink-50 flex justify-between items-center">
                        <div class="max-w-[65%]">
                            <p class="font-bold text-gray-700 text-xs truncate">${m.nama}</p>
                            <p class="text-[9px] text-gray-400 tracking-wider">${m.wa}</p>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[10px] font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-lg">${m.koin} Koin</span>
                                <span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-lg">${m.perak} Prk</span>
                            </div>
                        </div>
                        <button onclick="updateMemberData('${m.wa}', '${m.nama}')" 
                                class="bg-pink-500 text-white text-[9px] px-4 py-2 rounded-xl font-bold shadow-sm active:scale-90 transition-all uppercase tracking-tighter">
                            Update
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<p class="text-center text-red-400 text-[10px] py-20 italic font-bold">Gagal memuat database!</p>`;
            }
        }

        async function updateMemberData(wa, nama) {
            const koinBaru = prompt(`JUMLAH KOIN BARU untuk ${nama}:`, "0");
            const perakBaru = prompt(`JUMLAH PERAK BARU untuk ${nama}:`, "0");

            if(koinBaru !== null && perakBaru !== null) {
                toggleLoading(true);
                try {
                    await fetch(CONFIG.SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            wa: wa, 
                            nama: nama, 
                            koin: koinBaru, 
                            perak: perakBaru 
                        })
                    });
                    
                    alert("Data " + nama + " berhasil diupdate!");
                    // Beri jeda 1 detik agar Sheets selesai memproses sebelum refresh list
                    setTimeout(loadMemberData, 1000);
                } catch (err) {
                    alert("Gagal mengupdate koin.");
                } finally {
                    toggleLoading(false);
                }
            }
        }
    </script>
</body>
</html>
