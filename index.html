<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANITA OLSHOP - Member Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff1f7; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin: 30px 0; color: #e91e63; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(233,30,99,0.1); margin-bottom: 20px; }
        .btn { background: #e91e63; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-sec { background: #f8bbd9; color: #e91e63; }
        input { width: 100%; padding: 12px; border: 2px solid #f8bbd9; border-radius: 15px; margin-bottom: 10px; outline: none; }
        .hidden { display: none !important; }
        .tabs { display: flex; margin-bottom: 20px; background: #fce4ec; border-radius: 20px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; color: #e91e63; font-weight: bold; }
        .tab-btn.active { background: #e91e63; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .coin-txt { font-size: 3em; color: #e91e63; font-weight: bold; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div id="p-main" class="container">
    <div class="header"><h1>🛍️ KANITA OLSHOP</h1><p>Member & Loyalty System</p></div>
    <button class="btn" onclick="nav('p-auth')">MASUK / DAFTAR MEMBER</button>
</div>

<div id="p-auth" class="container hidden">
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div class="tabs">
            <button id="t-buy" class="tab-btn active" onclick="setTab('buy')">PEMBELI</button>
            <button id="t-own" class="tab-btn" onclick="setTab('own')">PEMILIK</button>
        </div>
        <div id="f-buy">
            <input type="text" id="buy-name" placeholder="Nama Lengkap">
            <input type="tel" id="buy-hp" placeholder="No WhatsApp (08...)">
            <button class="btn" onclick="actionBuy()">MULAI SEKARANG</button>
        </div>
        <div id="f-own" class="hidden">
            <input type="text" id="own-user" placeholder="Username">
            <input type="password" id="own-pass" placeholder="Password">
            <button class="btn" onclick="actionOwn()">LOGIN ADMIN</button>
        </div>
        <button class="btn btn-sec" onclick="nav('p-main')">KEMBALI</button>
    </div>
</div>

<div id="p-dash-buy" class="container hidden">
    <div class="card" style="text-align: center;">
        <h2 id="hello-buy">Halo!</h2>
        <div class="coin-txt"><span id="coin-buy">0</span> 💎</div>
        <p>Kumpulkan koin dengan belanja di Kanita Olshop!</p>
        <button class="btn btn-sec" onclick="location.reload()">KELUAR</button>
    </div>
</div>

<div id="p-dash-own" class="container hidden">
    <div class="header"><h2>👑 PANEL ADMIN</h2><button class="btn btn-sec" style="width: auto; padding: 5px 15px;" onclick="location.reload()">Logout</button></div>
    <div class="card">
        <h3>💰 Tambah Koin</h3>
        <input type="tel" id="search-hp" placeholder="Masukkan No HP Member">
        <button class="btn" onclick="findMember()">CARI MEMBER</button>
        <div id="topup-box" class="hidden" style="margin-top: 20px;">
            <p id="target-name" style="font-weight: bold; color: #e91e63;"></p>
            <input type="number" id="input-rp" placeholder="Nominal Belanja (Rp)">
            <button class="btn" onclick="addCoin()">ISI KOIN</button>
        </div>
    </div>
    <div class="card" style="text-align: center;">
        <h3>📱 QR CODE TOKO</h3>
        <canvas id="canvas-qr" style="margin: 15px auto;"></canvas>
    </div>
    <div class="card">
        <h3>📊 Daftar Member (<span id="total-m">0</span>)</h3>
        <table id="table-m"><thead><tr><th>Nama</th><th>HP</th><th>Koin</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBe-4ZFPB9Y-PVgHpBDtmZ-QpWZgHy5x0M",
        authDomain: "kanitshop-89e2d.firebaseapp.com",
        projectId: "kanitshop-89e2d",
        databaseURL: "https://kanitshop-89e2d-default-rtdb.firebaseio.com",
        storageBucket: "kanitshop-89e2d.firebasestorage.app",
        messagingSenderId: "982746261387",
        appId: "1:982746261387:web:d16dfa2ed014dac12a718e"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    let allM = [];
    let curT = null;

    window.nav = (id) => {
        document.querySelectorAll('.container').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.setTab = (t) => {
        document.getElementById('f-buy').classList.toggle('hidden', t === 'own');
        document.getElementById('f-own').classList.toggle('hidden', t === 'buy');
        document.getElementById('t-buy').classList.toggle('active', t === 'buy');
        document.getElementById('t-own').classList.toggle('active', t === 'own');
    };

    window.actionBuy = async () => {
        const n = document.getElementById('buy-name').value.trim();
        const h = document.getElementById('buy-hp').value.trim();
        if(!h.startsWith('08')) return alert('Gunakan nomor 08...');
        
        try {
            const snap = await get(ref(db, 'members/' + h));
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('hello-buy').innerText = "Halo, " + d.name;
                document.getElementById('coin-buy').innerText = d.coins || 0;
            } else {
                await set(ref(db, 'members/' + h), { name: n, phone: h, coins: 0 });
                document.getElementById('hello-buy').innerText = "Halo, " + n;
                document.getElementById('coin-buy').innerText = 0;
            }
            nav('p-dash-buy');
        } catch(e) { alert('Koneksi Gagal!'); }
    };

    window.actionOwn = () => {
        const u = document.getElementById('own-user').value.trim();
        const p = document.getElementById('own-pass').value;
        if(u === 'KANITAOLSHOP' && p === 'KANITATHENDY29062009') {
            nav('p-dash-own');
            QRCode.toCanvas(document.getElementById('canvas-qr'), window.location.href, { width: 150 });
            onValue(ref(db, 'members'), (s) => {
                const data = s.val();
                const tbody = document.querySelector('#table-m tbody');
                tbody.innerHTML = "";
                allM = data ? Object.values(data) : [];
                allM.forEach(m => {
                    tbody.innerHTML += `<tr><td>${m.name}</td><td>${m.phone}</td><td style="color:#e91e63; font-weight:bold">${m.coins || 0}</td></tr>`;
                });
                document.getElementById('total-m').innerText = allM.length;
            });
        } else { alert('Akses Ditolak!'); }
    };

    window.findMember = () => {
        const h = document.getElementById('search-hp').value.trim();
        curT = allM.find(m => m.phone === h);
        if(curT){
            document.getElementById('target-name').innerText = "Member: " + curT.name;
            document.getElementById('topup-box').classList.remove('hidden');
        } else { alert('Member tidak ditemukan!'); }
    };

    window.addCoin = async () => {
        const rp = parseInt(document.getElementById('input-rp').value);
        if(!rp || rp < 1000) return alert('Minimal Rp 1.000');
        const bonus = Math.floor(rp / 1000);
        await update(ref(db, 'members/' + curT.phone), { coins: (curT.coins || 0) + bonus });
        alert('Berhasil! Koin ditambahkan.');
        document.getElementById('topup-box').classList.add('hidden');
        document.getElementById('input-rp').value = "";
    };
</script>
</body>
</html>
